<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Data — DataVault Pro (GitHub)</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .view-container { padding: 16px; max-width: 800px; margin: 0 auto; position: relative; z-index: 1; }
        .view-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .back-link { text-decoration: none; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; font-weight: 500; font-size: 0.8rem; }
        .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .filter-btn {
            padding: 10px 18px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.02); color: var(--text-secondary); cursor: pointer;
            font-weight: 500; font-size: 0.75rem; transition: all 0.3s; display: flex; align-items: center; gap: 6px;
        }
        .filter-btn.active { background: rgba(0,229,255,0.12); border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .download-btn {
            margin-left: auto; padding: 10px 20px; border-radius: 25px;
            background: linear-gradient(135deg, #0d2137, #141830); border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan); cursor: pointer; font-family: 'Orbitron', sans-serif; font-weight: 600;
            font-size: 0.75rem; display: flex; align-items: center; gap: 6px;
        }
        .entry-list { display: flex; flex-direction: column; gap: 12px; }
        .entry-card {
            background: var(--bg-card); backdrop-filter: blur(12px); border-radius: var(--radius-md);
            padding: 14px 18px; border: 1px solid var(--glass-border); font-size: 0.8rem;
            color: var(--text-secondary); position: relative; transition: all 0.3s;
        }
        .entry-meta { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 6px; }
        .cat-badge { padding: 3px 12px; border-radius: 15px; background: rgba(0,229,255,0.1); color: var(--accent-cyan); font-weight: 600; font-size: 0.7rem; text-transform: uppercase; }
        .time-badge { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-muted); background: rgba(255,255,255,0.03); padding: 2px 10px; border-radius: 12px; }
        .entry-details { margin-top: 8px; line-height: 1.5; }
        .delete-btn {
            background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 6px;
            position: absolute; top: 12px; right: 12px; transition: color 0.2s;
        }
        .delete-btn:hover { color: var(--accent-pink); }
        .loading { text-align: center; padding: 40px; }
        .no-data { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="bg-particles" id="bgParticles"></div>
    <div class="toast-container" id="toastContainer"></div>
    <div class="view-container">
        <div class="view-header">
            <a href="index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
                Back to Entry
            </a>
            <h2 style="font-family:'Orbitron'; font-size:1.4rem; background: linear-gradient(135deg, #00e5ff, #b44dff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                DATA VAULT
            </h2>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-period="daily">📅 Daily</button>
            <button class="filter-btn" data-period="weekly">📆 Weekly</button>
            <button class="filter-btn" data-period="monthly">🗓️ Monthly</button>
            <button class="filter-btn" data-period="yearly">📈 Yearly</button>
            <button class="filter-btn" data-period="all">🌐 All</button>
            <button class="download-btn" id="downloadBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download CSV
            </button>
        </div>

        <div id="entriesContainer" class="entry-list">
            <div class="loading"><div class="spinner"></div> Loading from GitHub...</div>
        </div>
    </div>

    <script src="view.js"></script>
</body>
</html>
