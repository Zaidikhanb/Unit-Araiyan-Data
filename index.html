<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataVault Pro — GitHub Sync</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-particles" id="bgParticles"></div>
    <div class="toast-container" id="toastContainer"></div>

    <div class="app-container">
        <header class="app-header">
            <svg class="logo-icon" width="64" height="64" viewBox="0 0 64 64" fill="none">
                <path d="M32 6L58 32L32 58L6 32L32 6Z" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linejoin="round"/>
                <circle cx="32" cy="32" r="14" fill="url(#logoGrad)" opacity="0.15"/>
                <circle cx="32" cy="32" r="7" fill="url(#logoGrad)"/>
                <defs>
                    <linearGradient id="logoGrad" x1="6" y1="6" x2="58" y2="58">
                        <stop offset="0%" stop-color="#00e5ff"/>
                        <stop offset="100%" stop-color="#b44dff"/>
                    </linearGradient>
                </defs>
            </svg>
            <h1>DATA VAULT PRO</h1>
            <p class="subtitle">GitHub Cloud Sync · No Local Storage</p>
            <div class="live-time-wrapper">
                <span class="timestamp-display" id="liveTimestamp">
                    <span class="live-dot"></span><span id="liveTimeText">--</span>
                </span>
            </div>
        </header>

        <nav class="category-tabs" id="categoryTabs">
            <button class="cat-tab active" data-cat="items">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                Items
            </button>
            <button class="cat-tab" data-cat="samples">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                Samples
            </button>
            <button class="cat-tab" data-cat="cleaning">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M4 6l1 14h14l1-14"/><path d="M9 10v6"/><path d="M15 10v6"/></svg>
                Cleaning
            </button>
            <button class="cat-tab" data-cat="persons">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>
                Persons
            </button>
        </nav>

        <div id="formContainer">
            <!-- Items Form (identical to previous, just using API) -->
            <div class="glass-card collapsible open" id="itemsForm">
                <div class="collapsible-header section-title" data-target="itemsBody">
                    <span><span class="icon-dot"></span> Items Details</span>
                    <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="collapsible-body" id="itemsBody">
                    <label>Entry Type</label>
                    <div class="toggle-group" id="itemsInOut">
                        <button class="toggle-btn active-in" data-val="in">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg> IN
                        </button>
                        <button class="toggle-btn" data-val="out">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 19l-7-7 7-7"/></svg> OUT
                        </button>
                    </div>
                    <label>Item Category</label>
                    <select id="itemsSubCat">
                        <option value="thread">🧵 Thread</option>
                        <option value="cdSequence">💿 CD Sequence</option>
                        <option value="roleFussing">🔧 Role Fussing</option>
                        <option value="bobbin">🧶 Bobbin</option>
                        <option value="cone">📐 Cone</option>
                        <option value="colySequence">🎨 Coly Sequence</option>
                        <option value="otherItem">📦 Other Item</option>
                    </select>
                    <div id="itemsDynamicFields" class="dynamic-fields"></div>
                    <button class="btn-submit" id="btnSubmitItems">
                        <span class="btn-shimmer"></span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                        Save to GitHub
                    </button>
                </div>
            </div>

            <!-- Samples Form -->
            <div class="glass-card collapsible" id="samplesForm" style="display:none;">
                <div class="collapsible-header section-title" data-target="samplesBody">
                    <span><span class="icon-dot"></span> Sample Details</span>
                    <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="collapsible-body" id="samplesBody">
                    <label>Entry Type</label>
                    <div class="toggle-group" id="samplesInOut">
                        <button class="toggle-btn active-in" data-val="in">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg> IN
                        </button>
                        <button class="toggle-btn" data-val="out">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 19l-7-7 7-7"/></svg> OUT
                        </button>
                    </div>
                    <div class="form-row">
                        <div><label>Sample Name</label><input type="text" id="sampleName" placeholder="e.g. Fabric-A1"></div>
                        <div><label>Sample Color</label><input type="text" id="sampleColor" placeholder="e.g. Navy Blue"></div>
                    </div>
                    <div class="form-row full">
                        <div><label>Person Name</label><input type="text" id="samplePerson" placeholder="Person name"></div>
                    </div>
                    <button class="btn-submit" id="btnSubmitSamples">
                        <span class="btn-shimmer"></span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                        Save to GitHub
                    </button>
                </div>
            </div>

            <!-- Cleaning Form -->
            <div class="glass-card collapsible" id="cleaningForm" style="display:none;">
                <div class="collapsible-header section-title" data-target="cleaningBody">
                    <span><span class="icon-dot"></span> Cleaning Details</span>
                    <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="collapsible-body" id="cleaningBody">
                    <label>Entry Type</label>
                    <div class="toggle-group" id="cleaningInOut">
                        <button class="toggle-btn active-in" data-val="in">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg> IN (Returned)
                        </button>
                        <button class="toggle-btn" data-val="out">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 19l-7-7 7-7"/></svg> OUT (Sent)
                        </button>
                    </div>
                    <div class="form-row">
                        <div><label>Size (Guzz)</label><input type="text" id="cleaningSize" placeholder="e.g. 42"></div>
                        <div><label>Person Name</label><input type="text" id="cleaningPerson" placeholder="Person name"></div>
                    </div>
                    <button class="btn-submit" id="btnSubmitCleaning">
                        <span class="btn-shimmer"></span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                        Save to GitHub
                    </button>
                </div>
            </div>

            <!-- Persons Form -->
            <div class="glass-card collapsible" id="personsForm" style="display:none;">
                <div class="collapsible-header section-title" data-target="personsBody">
                    <span><span class="icon-dot"></span> Absent Person Details</span>
                    <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="collapsible-body" id="personsBody">
                    <div class="form-row">
                        <div><label>Absent Person Name</label><input type="text" id="absentName" placeholder="Full name"></div>
                        <div><label>Reason (Optional)</label><input type="text" id="absentReason" placeholder="e.g. Sick leave"></div>
                    </div>
                    <button class="btn-submit" id="btnSubmitPersons">
                        <span class="btn-shimmer"></span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                        Save to GitHub
                    </button>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn active" data-page="entry">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Entry
        </button>
        <a href="view.html" class="nav-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
            View Data
        </a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
